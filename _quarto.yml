project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "**/*.ipynb"

website:
  title: "engram"
  description: "Notebooks and experiments from my work in NeuroAI and brain–computer interfaces."
  site-url: "https://bkowshik.github.io/engram"
  repo-url: "https://github.com/bkowshik/engram"
  open-graph: true
  twitter-card: true
  navbar:
    title: "engram"
    right:
      - icon: house-door
        href: https://bkowshik.in
        aria-label: Personal site
      - icon: github
        href: https://github.com/bkowshik
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/bkowshik/
        aria-label: LinkedIn
      - icon: rss
        href: index.xml
        aria-label: RSS

# The build NEVER executes notebooks — it renders the outputs already saved in
# each .ipynb. Run a notebook (locally or in Colab), save it with its outputs,
# then commit. No kernel, Python, or dependencies are needed on CI.
execute:
  enabled: false

format:
  html:
    theme: cosmo
    toc: true
    code-tools: true
    code-copy: true
