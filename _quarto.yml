project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "**/*.ipynb"

website:
  title: "engram"
  description: "Notebooks and experiments from my work in NeuroAI and brain–computer interfaces."
  site-url: "https://bkowshik.github.io/engram"
  repo-url: "https://github.com/bkowshik/engram"
  favicon: assets/engram.svg
  image: assets/engram-card.svg
  open-graph: true
  twitter-card: true
  navbar:
    logo: assets/engram.svg
    title: engram
    left:
      - href: index.qmd
        text: Notebooks
      - href: cookbook.ipynb
        text: Cookbook
    right:
      - icon: house-door
        href: https://bkowshik.in
        aria-label: Personal site
      - icon: github
        href: https://github.com/bkowshik
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/bkowshik/
        aria-label: LinkedIn
      - icon: twitter-x
        href: https://x.com/bkowshik
        aria-label: X
      - icon: rss
        href: index.xml
        aria-label: RSS
  page-footer:
    border: true
    left: "© 2026 Bhargav Kowshik · built with [Quarto](https://quarto.org)"
    right:
      - icon: github
        href: https://github.com/bkowshik/engram
      - icon: rss
        href: index.xml

# Frozen, precomputed outputs: the site is assembled from the committed
# _freeze/ cache and is NEVER re-executed during a build. Render locally
# (`quarto preview` or `quarto render`) before pushing so _freeze stays current.
execute:
  freeze: auto

format:
  html:
    theme:
      light: [cosmo, theme.scss]
      dark: [darkly, theme.scss]
    toc: true
    code-tools: true
    code-copy: true
